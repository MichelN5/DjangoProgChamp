services:
  backend:
    build:
      context: ./DjangoProgChamp
    environment:
      DJANGO_SECRET_KEY: dev-only-change-me
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,backend
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:8080,http://localhost:8080
    ports:
      - "8000:8000"
    volumes:
      - ./DjangoProgChamp:/app

  frontend:
    build:
      context: ./vue-progchamp
    environment:
      VUE_APP_API_BASE_URL: http://127.0.0.1:8000/
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./vue-progchamp:/app
      - /app/node_modules
    depends_on:
      - backend
